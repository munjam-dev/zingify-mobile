name: zingify_mobile
description: Zingify Mobile App - Premium Messaging with Modern UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6
  
  # Navigation
  go_router: ^12.1.3
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # UI Enhancements
  lottie: ^2.7.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  
  # Glassmorphism UI
  glassmorphism: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
