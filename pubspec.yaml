name: zingify_mobile
description: Zingify Mobile App - Premium Messaging with Modern UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # HTTP Requests
  http: ^1.2.0
  
  # Socket.IO for real-time
  socket_io_client: ^2.0.3+1
  
  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.7.10
  
  # Country Code Picker
  country_code_picker: ^2.0.2
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Contacts
  contacts_service: ^0.6.3
  
  # Image Picker
  image_picker: ^1.0.4
  
  # File Picker
  file_picker: ^6.2.1
  
  # Emoji Picker
  emoji_picker_flutter: ^1.6.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/zingify_logo.png
    - assets/images/zingify_icon.png
    - assets/images/zingify_splash.png
    - assets/images/app_icon.png

  # App Icon
  # flutter_launcher_icons:
  #   android: "launcher_icon"
  #   ios: true
  #   image_path: "assets/images/app_icon.png"
