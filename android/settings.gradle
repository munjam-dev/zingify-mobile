pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")

        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { properties.load(it) }
        }

        def configuredPath = properties.getProperty("flutter.sdk") ?: System.getenv("FLUTTER_ROOT")
        if (configuredPath == null || configuredPath.trim().isEmpty()) {
            throw new GradleException(
                "Flutter SDK path is not configured. Set flutter.sdk in android/local.properties or set FLUTTER_ROOT."
            )
        }
        return configuredPath
    }
    settings.ext.flutterSdkPath = flutterSdkPath()

    includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    plugins {
        id("dev.flutter.flutter-gradle-plugin") version "1.0.0" apply false
        id("com.google.gms.google-services") version "4.4.4" apply false
        id("com.android.application") version "8.2.1" apply false
        id("org.jetbrains.kotlin.android") version "1.9.22" apply false
    }
}

plugins {
    id("dev.flutter.flutter-plugin-loader") version "1.0.0"
}

include(":app")
