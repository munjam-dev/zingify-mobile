# Codemagic Configuration for Zingify App
name: Zingify App Build

workflows:
  build-android:
    name: Build Android APK
    environment:
      flutter: stable
      java: 17
      xcode: latest
      android_studio: latest
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Accept Android licenses
        script: |
          yes | flutter doctor --android-licenses
      - name: Clean and Build APK
        script: |
          flutter clean
          flutter pub get
          flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
