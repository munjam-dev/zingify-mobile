name: Build Production APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version to use'
        required: false
        default: '3.16.0'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ github.event.inputs.flutter_version || '3.16.0' }}
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: |
        flutter pub get

    - name: Build APK
      run: |
        flutter clean
        flutter pub get
        flutter build apk --release --no-shrink

    - name: Build App Bundle (AAB)
      run: |
        flutter build appbundle --release --no-shrink

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: zingify-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30

    - name: Upload App Bundle
      uses: actions/upload-artifact@v3
      with:
        name: zingify-release-aab
        path: build/app/outputs/bundle/release/app-release.aab
        retention-days: 30

    - name: Generate Build Info
      run: |
        echo "## Build Information" >> build-info.md
        echo "- **Build Date**: $(date)" >> build-info.md
        echo "- **Flutter Version**: $(flutter --version | head -1)" >> build-info.md
        echo "- **APK Size**: $(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)" >> build-info.md
        echo "- **AAB Size**: $(du -h build/app/outputs/bundle/release/app-release.aab | cut -f1)" >> build-info.md
        echo "- **Commit**: ${{ github.sha }}" >> build-info.md
        cat build-info.md

    - name: Upload Build Info
      uses: actions/upload-artifact@v3
      with:
        name: build-info
        path: build-info.md
        retention-days: 30

  build-android-studio:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        cache: true

    - name: Build with Android Gradle
      run: |
        cd android
        ./gradlew assembleRelease
        ./gradlew bundleRelease

    - name: Upload Gradle APK
      uses: actions/upload-artifact@v3
      with:
        name: zingify-gradle-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Upload Gradle AAB
      uses: actions/upload-artifact@v3
      with:
        name: zingify-gradle-aab
        path: android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 30
