stages:
  - build

variables:
  FLUTTER_VERSION: "3.19.0"

build_android:
  stage: build
  image: cirrusci/flutter:$FLUTTER_VERSION
  before_script:
    - flutter doctor -v
    - flutter pub get
  script:
    - cd android
    - |
      # Fix AGP version to avoid V1/V2 embedding conflict
      sed -i.bak 's/id("com.android.application") version "8.1.0"/id("com.android.application") version "8.0.2"/g' settings.gradle
      sed -i.bak 's/id("com.android.application") version "8.2.0"/id("com.android.application") version "8.0.2"/g' settings.gradle
      sed -i.bak 's/id("com.android.application") version "9.0.0"/id("com.android.application") version "8.0.2"/g' settings.gradle
      sed -i.bak 's/id("com.android.application") version "8.1.0"/id("com.android.application") version "8.0.2"/g' app/build.gradle.kts
      sed -i.bak 's/id("com.android.application") version "8.2.0"/id("com.android.application") version "8.0.2"/g' app/build.gradle.kts
      sed -i.bak 's/id("com.android.application") version "9.0.0"/id("com.android.application") version "8.0.2"/g' app/build.gradle.kts
    - cd ..
    - flutter clean
    - flutter pub get
    - flutter build apk --release --no-shrink
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-release.apk
    expire_in: 1 week
  only:
    - main
